spring.application.name=ecommerceApi

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/lab8_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update # 'update' or 'create-drop' for development, 'none' or 'validate' for production
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port (optional, default is 8080)
server.port=8080

# JWT Configuration
app.jwtSecret=YOUR_VERY_SECRET_KEY_GOES_HERE_MAKE_IT_LONG_AND_RANDOM_FOR_SECURITY
app.jwtExpirationInMs=86400000 # 24 hours in milliseconds (24 * 60 * 60 * 1000)

file.upload-dir.upload-dir=./upload